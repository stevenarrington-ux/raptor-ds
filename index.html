<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raptor Design System v1.1</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23F97316'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-size='18' font-weight='800' fill='white' font-family='system-ui'>R</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary-50:#FFF7ED;--primary-100:#FFEDD5;--primary-200:#FED7AA;--primary-300:#FDBA74;
      --primary-400:#FB923C;--primary-500:#F97316;--primary-600:#EA580C;--primary-700:#C2410C;--primary-800:#9A3412;
      --neutral-50:#FAFAFA;--neutral-100:#F5F5F5;--neutral-200:#E5E5E5;--neutral-300:#D4D4D4;
      --neutral-400:#A3A3A3;--neutral-500:#737373;--neutral-600:#525252;--neutral-700:#404040;
      --neutral-800:#262626;--neutral-900:#171717;
      --success-500:#16A34A;--danger-500:#DC2626;--warning-500:#D97706;--info-500:#2563EB;
      --radius-sm:0.375rem;--radius-md:0.625rem;--radius-lg:0.875rem;--radius-xl:1.125rem;--radius-2xl:1.5rem;
      --shadow-sm:0 1px 2px rgba(0,0,0,0.06);
      --shadow-md:0 4px 12px -2px rgba(0,0,0,0.08),0 2px 4px -2px rgba(0,0,0,0.04);
      --shadow-focus:0 0 0 3px rgba(249,115,22,0.25);
      --shadow-focus-danger:0 0 0 3px rgba(220,38,38,0.25);
      --font-body:'DM Sans',system-ui,sans-serif;
      --font-display:'Plus Jakarta Sans',system-ui,sans-serif;
      --transition:0.15s ease;
    }
    html, body, #root { height: 100%; }
    input:focus,select:focus,textarea:focus { outline:none; border-color:var(--primary-500)!important; box-shadow:var(--shadow-focus)!important; }
    input.error:focus { border-color:var(--danger-500)!important; box-shadow:var(--shadow-focus-danger)!important; }
    button:focus-visible { outline:2px solid var(--primary-500); outline-offset:2px; }
    ::selection { background:var(--primary-200); color:var(--primary-800); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ─── ICONS ────────────────────────────────────────────────── */
const I = {
  Dashboard:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
  Users:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  Calendar:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  Clipboard:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></svg>,
  Chart:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>,
  Help:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
  Alert:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
  Bell:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
  ChevDown:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
  Mail:()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
  Edit:()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  Check:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  X:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  Clock:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  Plus:()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  Eye:()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  Save:()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
  Shield:()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>,
  Camera:()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
  Undo:()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>,
};

/* ─── BADGE ────────────────────────────────────────────────── */
const badgeColors = {default:{bg:"#404040",c:"#fff"},primary:{bg:"#F97316",c:"#fff"},success:{bg:"#16A34A",c:"#fff"},danger:{bg:"#DC2626",c:"#fff"},warning:{bg:"#D97706",c:"#fff"},info:{bg:"#2563EB",c:"#fff"},navy:{bg:"#312E81",c:"#fff"},magenta:{bg:"#C026D3",c:"#fff"},teal:{bg:"#0D9488",c:"#fff"}};
const Badge=({children,variant="default",size="sm"})=>{const v=badgeColors[variant]||badgeColors.default;return(<span role="status" style={{background:v.bg,color:v.c,display:"inline-flex",alignItems:"center",gap:"5px",padding:size==="sm"?"3px 10px":"5px 14px",borderRadius:"9999px",fontSize:size==="sm"?"0.75rem":"0.8125rem",fontWeight:600,fontFamily:"var(--font-body)",lineHeight:1.5,whiteSpace:"nowrap",letterSpacing:"0.01em"}}>{children}</span>);};

/* ─── BUTTON ───────────────────────────────────────────────── */
const Button=({children,variant="primary",size="md",icon,onClick,style:xs,disabled})=>{
  const[h,setH]=useState(false);
  const vs={primary:{bg:h?"#EA580C":"#F97316",c:"#fff",b:"none"},secondary:{bg:h?"#F5F5F5":"#fff",c:"#404040",b:"1px solid #D4D4D4"},danger:{bg:h?"#B91C1C":"#DC2626",c:"#fff",b:"none"},ghost:{bg:h?"#F5F5F5":"transparent",c:"#525252",b:"none"},outline:{bg:h?"#FFF7ED":"transparent",c:"#EA580C",b:"2px solid #FB923C"},success:{bg:h?"#15803D":"#16A34A",c:"#fff",b:"none"}};
  const sz={sm:{p:"6px 12px",f:"0.8125rem"},md:{p:"9px 18px",f:"0.875rem"},lg:{p:"11px 22px",f:"0.9375rem"}};
  const v=vs[variant]||vs.primary;const s=sz[size]||sz.md;
  return(<button onClick={onClick} disabled={disabled} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{background:disabled?"#E5E5E5":v.bg,color:disabled?"#A3A3A3":v.c,border:v.b,padding:s.p,fontSize:s.f,display:"inline-flex",alignItems:"center",gap:"7px",borderRadius:"var(--radius-lg)",fontWeight:600,fontFamily:"var(--font-body)",cursor:disabled?"not-allowed":"pointer",transition:"all var(--transition)",letterSpacing:"-0.01em",lineHeight:1.4,opacity:disabled?0.6:1,...xs}}>{icon}{children}</button>);
};

/* ─── FORM FIELD ───────────────────────────────────────────── */
const FormField=({label,required,value,onChange,error,hint,type="text",placeholder,disabled,readOnly})=>{
  const[f,setF]=useState(false);
  return(<div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
    {label&&<label style={{fontSize:"0.8125rem",fontWeight:600,color:"#404040",fontFamily:"var(--font-body)",display:"flex",alignItems:"center",gap:"4px"}}>{label}{required&&<span style={{color:"#DC2626",fontWeight:700}}>*</span>}</label>}
    <input type={type} value={value} onChange={onChange} placeholder={placeholder} disabled={disabled} readOnly={readOnly} onFocus={()=>setF(true)} onBlur={()=>setF(false)} aria-invalid={!!error}
      style={{width:"100%",padding:"10px 14px",borderRadius:"var(--radius-md)",border:`1.5px solid ${error?"#DC2626":f?"#F97316":"#D4D4D4"}`,fontSize:"0.9375rem",fontFamily:"var(--font-body)",color:disabled?"#A3A3A3":"#171717",background:disabled?"#FAFAFA":readOnly?"#F5F5F5":"#fff",transition:"all var(--transition)",boxShadow:f?(error?"var(--shadow-focus-danger)":"var(--shadow-focus)"):"none",outline:"none",cursor:disabled?"not-allowed":readOnly?"default":"text"}}/>
    {error&&<span role="alert" style={{fontSize:"0.75rem",color:"#DC2626",fontWeight:500,display:"flex",alignItems:"center",gap:"4px",fontFamily:"var(--font-body)"}}>⚠ {error}</span>}
    {hint&&!error&&<span style={{fontSize:"0.75rem",color:"#737373",fontFamily:"var(--font-body)"}}>{hint}</span>}
  </div>);
};

/* ─── FORM SELECT ──────────────────────────────────────────── */
const FormSelect=({label,required,value,onChange,options=[],disabled})=>{
  const[f,setF]=useState(false);
  return(<div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
    {label&&<label style={{fontSize:"0.8125rem",fontWeight:600,color:"#404040",fontFamily:"var(--font-body)",display:"flex",alignItems:"center",gap:"4px"}}>{label}{required&&<span style={{color:"#DC2626",fontWeight:700}}>*</span>}</label>}
    <div style={{position:"relative"}}>
      <select value={value} onChange={onChange} disabled={disabled} onFocus={()=>setF(true)} onBlur={()=>setF(false)}
        style={{width:"100%",padding:"10px 36px 10px 14px",borderRadius:"var(--radius-md)",border:`1.5px solid ${f?"#F97316":"#D4D4D4"}`,fontSize:"0.9375rem",fontFamily:"var(--font-body)",color:disabled?"#A3A3A3":"#171717",background:disabled?"#FAFAFA":"#fff",appearance:"none",cursor:disabled?"not-allowed":"pointer",transition:"all var(--transition)",outline:"none",boxShadow:f?"var(--shadow-focus)":"none"}}>
        {options.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
      <div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",color:"#737373"}}><I.ChevDown/></div>
    </div>
  </div>);
};

/* ─── STAT CARD ────────────────────────────────────────────── */
const StatCard=({label,value,change,icon,accent="#F97316"})=>(<div style={{background:"#fff",borderRadius:"var(--radius-xl)",padding:"20px",border:"1px solid #E5E5E5",display:"flex",flexDirection:"column",gap:"10px",flex:1,minWidth:0}}>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
    <span style={{fontSize:"0.8125rem",color:"#737373",fontWeight:500,fontFamily:"var(--font-body)"}}>{label}</span>
    <div style={{width:34,height:34,borderRadius:"var(--radius-lg)",background:accent,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}>{icon}</div>
  </div>
  <div style={{display:"flex",alignItems:"baseline",gap:"8px"}}>
    <span style={{fontSize:"1.75rem",fontWeight:800,fontFamily:"var(--font-display)",color:"#171717",letterSpacing:"-0.03em",lineHeight:1}}>{value}</span>
    {change!=null&&<Badge variant={change>0?"success":"danger"} size="sm">{change>0?"+":""}{change}%</Badge>}
  </div>
</div>);

/* ─── SIDEBAR ──────────────────────────────────────────────── */
const Sidebar=({active,onNav})=>(<div style={{width:240,background:"#171717",display:"flex",flexDirection:"column",flexShrink:0}}>
  <div style={{padding:"20px 20px 20px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
    <span style={{fontFamily:"var(--font-display)",fontSize:"1.25rem",fontWeight:800,color:"#F97316",letterSpacing:"-0.03em"}}>RAPTOR</span>
    <span style={{fontSize:"0.5625rem",color:"rgba(255,255,255,0.35)",display:"block",letterSpacing:"0.12em",fontWeight:500,marginTop:"2px",textTransform:"uppercase"}}>Technologies</span>
  </div>
  <div style={{padding:"16px 12px 6px",fontSize:"0.6875rem",color:"rgba(255,255,255,0.3)",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase"}}>Volunteer Management</div>
  <nav style={{padding:"0 8px",display:"flex",flexDirection:"column",gap:"2px"}} role="navigation" aria-label="Main navigation">
    {[{id:"dashboard",icon:<I.Dashboard/>,label:"Dashboard"},{id:"volunteers",icon:<I.Users/>,label:"Volunteers"},{id:"events",icon:<I.Calendar/>,label:"Events"},{id:"approval",icon:<I.Clipboard/>,label:"Approval Queue",badge:15},{id:"reports",icon:<I.Chart/>,label:"Reports"},{id:"support",icon:<I.Help/>,label:"Support"}].map(item=>(
      <button key={item.id} onClick={()=>onNav&&onNav(item.id)} aria-current={active===item.id?"page":undefined} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",borderRadius:"var(--radius-lg)",border:"none",cursor:"pointer",background:active===item.id?"rgba(249,115,22,0.14)":"transparent",color:active===item.id?"#FB923C":"rgba(255,255,255,0.5)",fontSize:"0.875rem",fontWeight:active===item.id?600:400,fontFamily:"var(--font-body)",transition:"all var(--transition)",textAlign:"left",width:"100%"}}>
        {item.icon}{item.label}
        {item.badge&&<span style={{marginLeft:"auto",background:"#DC2626",color:"#fff",fontSize:"0.6875rem",fontWeight:700,padding:"1px 8px",borderRadius:"9999px",minWidth:22,textAlign:"center"}}>{item.badge}</span>}
      </button>
    ))}
  </nav>
  <div style={{marginTop:"auto",padding:"16px 12px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
    <button style={{display:"flex",alignItems:"center",gap:"8px",width:"100%",padding:"10px 12px",background:"rgba(220,38,38,0.12)",border:"1.5px solid rgba(220,38,38,0.25)",borderRadius:"var(--radius-lg)",color:"#EF4444",fontSize:"0.8125rem",fontWeight:700,cursor:"pointer",fontFamily:"var(--font-body)",justifyContent:"center",letterSpacing:"0.02em"}}><I.Alert/> EMERGENCY</button>
  </div>
</div>);

/* ─── TOPBAR ───────────────────────────────────────────────── */
const Topbar=({breadcrumb,actions})=>(<div style={{display:"flex",alignItems:"center",padding:"10px 24px",borderBottom:"1px solid #E5E5E5",background:"#fff",flexShrink:0,minHeight:52}}>
  <nav aria-label="Breadcrumb" style={{display:"flex",alignItems:"center",gap:"6px",fontSize:"0.8125rem",fontFamily:"var(--font-body)"}}>
    {breadcrumb&&breadcrumb.map((b,i)=>(<span key={i} style={{display:"flex",alignItems:"center",gap:"6px"}}>{i>0&&<span style={{color:"#D4D4D4"}} aria-hidden="true">/</span>}<span style={{color:i===breadcrumb.length-1?"#171717":"#737373",fontWeight:i===breadcrumb.length-1?600:400,cursor:i<breadcrumb.length-1?"pointer":"default"}}>{b}</span></span>))}
  </nav>
  <div style={{marginLeft:"auto",display:"flex",gap:"8px",alignItems:"center"}}>{actions}</div>
</div>);

/* ─── TOKENS VIEW ──────────────────────────────────────────── */
const TokensView=()=>{
  const palettes=[
    {name:"Primary — Raptor Orange",shades:[["50","#FFF7ED"],["100","#FFEDD5"],["200","#FED7AA"],["300","#FDBA74"],["400","#FB923C"],["500","#F97316"],["600","#EA580C"],["700","#C2410C"],["800","#9A3412"]]},
    {name:"Neutral",shades:[["50","#FAFAFA"],["100","#F5F5F5"],["200","#E5E5E5"],["300","#D4D4D4"],["400","#A3A3A3"],["500","#737373"],["600","#525252"],["700","#404040"],["800","#262626"],["900","#171717"]]},
    {name:"Semantic",shades:[["Success","#16A34A"],["Danger","#DC2626"],["Warning","#D97706"],["Info","#2563EB"]]},
    {name:"Extended — SmartPass Accent",shades:[["Navy","#312E81"],["Magenta","#C026D3"],["Teal","#0D9488"]]}
  ];
  return(<div style={{display:"flex",flexDirection:"column",gap:"32px"}}>
    <section>
      <h3 style={{fontFamily:"var(--font-display)",fontSize:"1.125rem",fontWeight:700,color:"#171717",marginBottom:"16px"}}>Color Palette</h3>
      {palettes.map(p=>(<div key={p.name} style={{marginBottom:"20px"}}><span style={{fontSize:"0.8125rem",fontWeight:600,color:"#525252",display:"block",marginBottom:"8px"}}>{p.name}</span><div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>{p.shades.map(([name,hex])=>(<div key={name} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}><div style={{width:54,height:42,background:hex,borderRadius:"var(--radius-md)",border:"1px solid rgba(0,0,0,0.06)",boxShadow:"var(--shadow-sm)"}}/><span style={{fontSize:"0.625rem",color:"#737373",fontFamily:"var(--font-body)",fontWeight:500}}>{name}</span><span style={{fontSize:"0.5625rem",color:"#A3A3A3",fontFamily:"monospace"}}>{hex}</span></div>))}</div></div>))}
    </section>
    <section>
      <h3 style={{fontFamily:"var(--font-display)",fontSize:"1.125rem",fontWeight:700,color:"#171717",marginBottom:"16px"}}>Badges — Bold Style</h3>
      <div style={{background:"#fff",padding:"24px",borderRadius:"var(--radius-xl)",border:"1px solid #E5E5E5"}}>
        <p style={{fontSize:"0.8125rem",color:"#737373",marginBottom:"16px",lineHeight:1.5}}>SmartPass-style saturated backgrounds with white text. All combos meet WCAG AA for bold text (≥ 3:1 contrast ratio, 600 weight).</p>
        <div style={{display:"flex",gap:"10px",flexWrap:"wrap",marginBottom:"16px"}}>
          <Badge variant="success"><I.Check/> Approved</Badge><Badge variant="primary"><I.Clock/> Pending</Badge><Badge variant="danger"><I.X/> Denied</Badge><Badge variant="warning"><I.Alert/> Expiring</Badge><Badge variant="info"><I.Shield/> Background Check</Badge><Badge variant="navy">Main Office</Badge><Badge variant="magenta">Nurse</Badge><Badge variant="teal">Library</Badge>
        </div>
        <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}><Badge variant="success" size="md"><I.Check/> Approved</Badge><Badge variant="primary" size="md"><I.Clock/> Pending Review</Badge><Badge variant="danger" size="md"><I.X/> Application Denied</Badge></div>
      </div>
    </section>
    <section>

      {view==="tokens"&&<div style={{maxWidth:900,margin:"0 auto",padding:"32px 24px"}}><h1 style={{fontFamily:"var(--font-display)",fontSize:"1.75rem",fontWeight:800,color:"#171717",letterSpacing:"-0.03em",marginBottom:"6px"}}>Tokens, Badges & Interactive States</h1><p style={{fontSize:"0.9375rem",color:"#737373",marginBottom:"32px",lineHeight:1.6}}>Foundational visual language with WCAG AA compliance. Bold badge styling matches SmartPass patterns — saturated backgrounds with white text. All interactive elements include visible focus indicators, error states, and disabled treatments.</p><TokensView/></div>}
      {view==="dashboard"&&<DashboardView/>}
      {view==="edit"&&<VolunteerEditView/>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
